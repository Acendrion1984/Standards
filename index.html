<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standards & Normen · ZfP Portal</title>

  <style>
    /* ===== Design-Variablen (identisch zum Portal) ===== */
    :root {
      --radius: 16px;
      --shadow-sm: 0 8px 24px rgba(0,0,0,0.08);
      --shadow-md: 0 14px 32px rgba(0,0,0,0.12);
      --shadow-lg: 0 22px 48px rgba(0,0,0,0.16);
      
      /* Light Mode Colors */
      --bg: #f7f8fa;
      --fg: #2b2f33;
      --muted: #5f6b73;
      --border: #e5e9ef;
      --card-bg: #ffffff;
      --card-border: rgba(0,0,0,0.08);
      
      /* Hero */
      --hero-start: #16A085;
      --hero-end: #138D75;
      --hero-border: rgba(22,160,133,0.25);
      --hero-text: #ffffff;
      
      /* Tile Farben – Türkis für Standards */
      --standard-start: #16A085;
      --standard-end: #138D75;
      --tile-fg: #fff;
      
      /* Buttons & Akzente */
      --button-bg: #3498db;
      --button-hover: #2980b9;
      --button-text: #ffffff;
      --button-shadow: 0 4px 10px rgba(0,0,0,0.15);
      
      --header-border: #2c3e50;
      --header-text: #2c3e50;
      --creator-color: #2c3e50;
      
      --filter-bg: #ffffff;
      --filter-border: #d1d5db;
      --filter-focus: #16A085;

      --success-bg: #27ae60;
      --danger-bg: #e74c3c;
      --warning-bg: #f39c12;
    }

    /* ===== Dark Mode ===== */
    body.dark-mode {
      --bg: #121212;
      --fg: #e0e0e0;
      --muted: #c2c7cc;
      --border: rgba(255,255,255,0.08);
      --card-bg: #1e1e1e;
      --card-border: rgba(255,255,255,0.12);
      
      --hero-start: #0e6b58;
      --hero-end: #0b5f4e;
      --hero-border: #1abc9c;
      --hero-text: #ffffff;
      
      --button-bg: #2980b9;
      --button-hover: #1f6692;
      --button-text: #ffffff;
      
      --header-border: #444444;
      --header-text: #ffffff;
      --creator-color: #ffffff;
      
      --filter-bg: #1e1e1e;
      --filter-border: #444444;
      --filter-focus: #1abc9c;
      
      --success-bg: #2ecc71;
      --danger-bg: #e74c3c;
      --warning-bg: #f39c12;
    }

    /* ===== Basis ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      font-size: 16px;
      transition: background-color 0.3s ease, color 0.3s ease;
      padding: 16px;
    }

    /* Hauptcontainer – jetzt deutlich breiter (1800px) */
    .normen-portal {
      max-width: 1800px;
      margin: 16px auto;
      background: var(--card-bg);
      color: var(--fg);
      padding: 22px 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--card-border);
      transition: all 0.3s ease;
    }

    /* Header mit Logo */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--header-border);
    }
    
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-bottom: 6px;
    }
    
    .schaeffler-logo {
      height: 42px;
      width: auto;
      filter: brightness(1);
      transition: filter 0.3s ease;
    }
    
    body.dark-mode .schaeffler-logo {
      filter: brightness(1.2);
    }

    h1 {
      color: var(--header-text);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0;
    }

    /* Hero Bereich */
    .hero {
      position: relative;
      margin: 20px 0 24px;
      border-radius: var(--radius);
      padding: 24px 32px;
      background: linear-gradient(145deg, var(--hero-start) 0%, var(--hero-end) 100%);
      border: 1px solid var(--hero-border);
      color: white;
      box-shadow: var(--shadow-md);
    }
    .hero h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .hero p {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    /* Admin-Toolbar – kompakt und klar */
    .admin-toolbar {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 24px;
    }
    .token-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .token-section label {
      font-weight: 600;
      color: var(--fg);
    }
    .token-section input {
      padding: 10px 16px;
      border: 2px solid var(--filter-border);
      border-radius: 40px;
      background: var(--filter-bg);
      color: var(--fg);
      width: 280px;
      font-family: monospace;
    }
    .token-section button {
      background: var(--button-bg);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: var(--button-shadow);
    }
    .token-section button:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
    }
    .link-aktion {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }
    .link-aktion button {
      background: var(--card-bg);
      border: 2px solid var(--filter-border);
      color: var(--fg);
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .link-aktion button:hover {
      border-color: var(--filter-focus);
      background: var(--filter-focus);
      color: white;
    }

    /* Filterbereich */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 24px 0;
      padding: 18px 20px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    select, input {
      padding: 12px 18px;
      font-size: 1rem;
      border: 2px solid var(--filter-border);
      border-radius: 40px;
      background: var(--filter-bg);
      color: var(--fg);
      transition: all 0.2s ease;
    }
    select { min-width: 160px; cursor: pointer; }
    input { flex: 1; min-width: 260px; }
    select:focus, input:focus {
      border-color: var(--filter-focus);
      box-shadow: 0 0 0 4px rgba(22,160,133,0.15);
      outline: none;
    }

    /* Tabelle – sauber und luftig */
    .table-container {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-top: 16px;
      box-shadow: var(--shadow-sm);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    th {
      background: var(--bg);
      color: var(--fg);
      font-weight: 700;
      padding: 18px 16px;
      text-align: left;
      border-bottom: 2px solid var(--border);
      font-size: 0.95rem;
    }
    td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* Norm-Link Button */
    .norm-link {
      display: inline-block;
      background: var(--button-bg);
      color: white;
      padding: 8px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: 0.2s;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .norm-link:hover {
      background: var(--button-hover);
      transform: scale(1.02);
      text-decoration: none;
      color: white;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }
    .company-info { font-weight: 600; color: var(--header-text); }
    .creator-info { font-weight: 700; color: var(--creator-color); }

    /* Theme Toggle */
    .theme-toggle-button {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 2px solid var(--border);
      color: var(--fg);
      font-size: 26px;
      cursor: pointer;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .theme-toggle-button:hover {
      transform: translateY(-5px) scale(1.05);
      border-color: var(--filter-focus);
    }

    /* Mobile Overrides */
    @media (max-width: 1000px) {
      .normen-portal { padding: 16px; }
      .admin-toolbar { flex-direction: column; align-items: stretch; }
      .link-aktion { margin-left: 0; justify-content: flex-end; }
    }
    @media (max-width: 768px) {
      .token-section input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="normen-portal">
    <!-- Header -->
    <header>
      <div class="logo-container">
        <img class="schaeffler-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/72/Schaeffler_logo.svg" alt="Schaeffler Logo">
      </div>
      <h1>Standards & Normen</h1>
    </header>

    <!-- Hero Bereich -->
    <div class="hero">
      <h2>ZfP Normen & Standards</h2>
      <p>Verwaltung interner und externer Normen – inkl. GitHub-Sync</p>
    </div>

    <!-- Admin-Toolbar: Token + Link-Liste steuern -->
    <div class="admin-toolbar">
      <div class="token-section">
        <label>🔑 GitHub Token</label>
        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxx" />
        <button id="saveTokenBtn">Speichern</button>
      </div>
      <div class="link-aktion">
        <button id="newNormBtn">➕ Neue Norm</button>
        <button id="syncFromGithubBtn">⬇️ Sync von GitHub</button>
      </div>
    </div>

    <!-- Filter -->
    <div class="filters">
      <input type="text" id="suche" placeholder="Suche nach Titel, Norm, Organisation...">
      <select id="verfahrenFilter">
        <option value="">Alle Verfahren</option>
        <option value="VT">VT</option>
        <option value="MT">MT</option>
        <option value="PT">PT</option>
        <option value="UT">UT</option>
        <option value="ET">ET</option>
        <option value="RT">RT</option>
        <option value="allgemein">allgemein</option>
      </select>
      <select id="typFilter">
        <option value="">Alle Typen</option>
        <option value="Norm">Norm</option>
        <option value="Standard">Standard</option>
        <option value="Richtlinie">Richtlinie</option>
        <option value="Spezifikation">Spezifikation</option>
      </select>
    </div>

    <!-- Tabelle mit Normen -->
    <div class="table-container">
      <table id="normTable">
        <thead>
          <tr><th>Verfahren</th><th>Typ</th><th>Titel</th><th>Norm</th><th>Organisation</th><th>Link</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Footer -->
    <footer>
      <div class="company-info">Schaeffler Technologies AG & Co. KG</div>
      <div class="version-info">Version 01, 14.02.2026 · JSON-gestützte Linkverwaltung</div>
      <div>ZfP-Portal Schweinfurt</div>
      <div class="creator-info">Ersteller: Häusner Daniel, WI/SW2-PQT</div>
    </footer>
  </div>

  <button class="theme-toggle-button" id="themeToggleBtn">🌓</button>

  <script>
    (function() {
      // ===== KONFIGURATION =====
      const GITHUB_USER = "Acendrion1984";
      const REPO_NAME = "Standards";
      const JSON_PATH = "Standards.json";          // Datei im Repo
      const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${JSON_PATH}`;
      const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${JSON_PATH}`;
      
      const THEME_STORAGE_KEY = 'zfp-theme-preference';
      const TOKEN_STORAGE_KEY = 'github_token_standards'; // lokal speichern (optional)

      let normenDaten = [];                // Array aller Norm-Objekte
      let githubToken = localStorage.getItem(TOKEN_STORAGE_KEY) || '';

      // DOM-Elemente
      const tbody = document.getElementById("tableBody");
      const tokenInput = document.getElementById("githubToken");
      const saveTokenBtn = document.getElementById("saveTokenBtn");
      const newNormBtn = document.getElementById("newNormBtn");
      const syncBtn = document.getElementById("syncFromGithubBtn");
      const sucheInput = document.getElementById("suche");
      const verfahrenFilter = document.getElementById("verfahrenFilter");
      const typFilter = document.getElementById("typFilter");

      // ===== Token-Handling =====
      if (githubToken) tokenInput.value = githubToken;
      saveTokenBtn.addEventListener("click", () => {
        githubToken = tokenInput.value.trim();
        localStorage.setItem(TOKEN_STORAGE_KEY, githubToken);
        alert("✅ Token gespeichert (lokal)");
      });

      // ===== THEME =====
      function initTheme() {
        const saved = localStorage.getItem(THEME_STORAGE_KEY) || 'light';
        document.body.classList.toggle('dark-mode', saved === 'dark');
      }
      function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem(THEME_STORAGE_KEY, document.body.classList.contains('dark-mode') ? 'dark' : 'light');
      }
      document.getElementById("themeToggleBtn").addEventListener("click", toggleTheme);
      initTheme();

      // ===== Laden von GitHub (JSON) =====
      async function ladeVonGithub() {
        try {
          const response = await fetch(RAW_URL, { cache: "no-cache" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const json = await response.json();
          if (Array.isArray(json)) {
            normenDaten = json;
          } else {
            normenDaten = [];
          }
          anzeigen();
        } catch (e) {
          console.warn("Konnte nicht von GitHub laden, starte mit Beispiel", e);
          // Fallback-Beispiel (entspricht der CSV-Struktur)
          normenDaten = [
            { verfahren: "VT", typ: "Norm", titel: "ZfP - Qualifizierung von Personal", norm: "DIN EN ISO 9712", org: "ISO", link: "https://www.iso.org" },
            { verfahren: "MT", typ: "Standard", titel: "Magnetic Particle Testing", norm: "ASTM E1444", org: "ASTM", link: "https://www.astm.org" },
            { verfahren: "allgemein", typ: "Richtlinie", titel: "ZfP Review Audits", norm: "IN QP 29005", org: "Schaeffler", link: "#" }
          ];
          anzeigen();
        }
      }

      // ===== Speichern auf GitHub (PUT) =====
      async function speichereAufGithub() {
        if (!githubToken) {
          alert("❌ Bitte zuerst GitHub-Token eingeben und speichern.");
          return;
        }

        const contentStr = JSON.stringify(normenDaten, null, 2);
        const contentBase64 = btoa(unescape(encodeURIComponent(contentStr))); // UTF-8 safe

        // Zuerst SHA der vorhandenen Datei holen (wenn existiert)
        let sha = null;
        try {
          const meta = await fetch(API_URL, { headers: { Authorization: `token ${githubToken}` } });
          if (meta.ok) {
            const data = await meta.json();
            sha = data.sha;
          }
        } catch (e) { /* Datei existiert nicht – dann ohne SHA */ }

        const body = {
          message: "Update Standards.json via App",
          content: contentBase64,
          branch: "main"
        };
        if (sha) body.sha = sha;

        try {
          const response = await fetch(API_URL, {
            method: "PUT",
            headers: {
              Authorization: `token ${githubToken}`,
              Accept: "application/vnd.github+json"
            },
            body: JSON.stringify(body)
          });
          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || "Fehler beim Speichern");
          }
          alert("✅ Erfolgreich auf GitHub gespeichert (Standards.json)");
        } catch (error) {
          alert("❌ Fehler: " + error.message);
        }
      }

      // ===== Anzeige + Filter =====
      function anzeigen() {
        const suchtext = sucheInput.value.toLowerCase();
        const vFilter = verfahrenFilter.value;
        const tFilter = typFilter.value;

        const gefiltert = normenDaten.filter(e => {
          if (vFilter && e.verfahren?.toLowerCase() !== vFilter.toLowerCase()) return false;
          if (tFilter && e.typ?.toLowerCase() !== tFilter.toLowerCase()) return false;
          if (suchtext) {
            const feld = [e.titel, e.norm, e.org, e.verfahren].join(' ').toLowerCase();
            return feld.includes(suchtext);
          }
          return true;
        });

        tbody.innerHTML = "";
        if (gefiltert.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px;">Keine Einträge gefunden</td></tr>`;
          return;
        }

        gefiltert.forEach(e => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td data-label="Verfahren">${e.verfahren || ''}</td>
            <td data-label="Typ">${e.typ || ''}</td>
            <td data-label="Titel">${e.titel || ''}</td>
            <td data-label="Norm">${e.norm || ''}</td>
            <td data-label="Organisation">${e.org || ''}</td>
            <td data-label="Link"><a href="${e.link || '#'}" class="norm-link" target="_blank" rel="noopener">Öffnen</a></td>
          `;
          tbody.appendChild(tr);
        });
      }

      // ===== Neuen Norm-Eintrag (Dialog) =====
      function neueNormErfassen() {
        const verfahren = prompt("Verfahren (z.B. UT, MT, allgemein):", "UT");
        if (verfahren === null) return;
        const typ = prompt("Typ (Norm/Standard/Richtlinie/Spezifikation):", "Norm");
        if (typ === null) return;
        const titel = prompt("Titel:", "");
        if (!titel) return;
        const norm = prompt("Norm-Kennung (z.B. DIN EN ISO 9712):", "");
        if (!norm) return;
        const org = prompt("Organisation (z.B. ISO, ASTM, Schaeffler):", "");
        if (!org) return;
        const link = prompt("URL (https://...):", "https://");
        if (!link || link === "https://") return;

        normenDaten.push({
          verfahren: verfahren.trim(),
          typ: typ.trim(),
          titel: titel.trim(),
          norm: norm.trim(),
          org: org.trim(),
          link: link.trim()
        });

        // Sortieren nach Norm (einfach alphabetisch)
        normenDaten.sort((a,b) => (a.norm || '').localeCompare(b.norm || ''));
        anzeigen();

        // Automatisch auf GitHub speichern? Besser erstmal manuell per Sync-Button.
        if (confirm("Möchtest du die aktualisierte Liste jetzt auf GitHub speichern?")) {
          speichereAufGithub();
        }
      }

      // ===== Event-Listener =====
      sucheInput.addEventListener("input", anzeigen);
      verfahrenFilter.addEventListener("change", anzeigen);
      typFilter.addEventListener("change", anzeigen);

      // Neuen Eintrag anlegen
      newNormBtn.addEventListener("click", neueNormErfassen);

      // Sync von GitHub (laden)
      syncBtn.addEventListener("click", () => {
        ladeVonGithub();
      });

      // Beim Start laden
      ladeVonGithub();

      // Zusätzlich: mit "Strg+Enter" speichern (optional)
      window.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "s") {
          e.preventDefault();
          speichereAufGithub();
        }
      });

      // ===== GitHub Speichern direkt über extra Funktion (wird von Buttons genutzt) =====
      // Die speichereAufGithub Funktion ist bereits definiert. Wir könnten noch einen "Speichern"-Button ergänzen,
      // aber der Sync-Button lädt nur, deshalb hängen wir eine manuelle Speichermöglichkeit an:
      // (Im Admin-Toolbar fehlt noch ein expliziter "⬆️ Speichern nach GitHub"-Button – ich füge ihn via JS hinzu, oder baue ihn direkt ein.
      // Der Kunde wollte aber vor allem, dass Links in JSON auf Github gespeichert werden. Über neuen Norm-Dialog + speichereAufGithub ist das gegeben.
      // Für bessere UX: zusätzlicher Button "Änderungen auf GitHub speichern"
      const speichernBtn = document.createElement("button");
      speichernBtn.innerHTML = "⬆️ Speichern nach GitHub";
      speichernBtn.style.marginLeft = "10px";
      speichernBtn.classList.add("link-aktion"); // Stil anpassen
      speichernBtn.addEventListener("click", speichereAufGithub);
      document.querySelector(".link-aktion").appendChild(speichernBtn);

      // Sortierung nach Norm einmal initial
      normenDaten.sort((a,b) => (a.norm || '').localeCompare(b.norm || ''));
    })();
  </script>
</body>
</html>
